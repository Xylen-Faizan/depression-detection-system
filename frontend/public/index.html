    <title>Clinical Ethereal - Depression Detection Suite</title>

                        "on-background": "#dae2fd",
                        "on-primary-fixed": "#001f29",
                        "on-secondary-fixed-variant": "#3a485b",
                        "surface-container-lowest": "#060e20",
                        "surface-tint": "#87d0f0",
                        "on-tertiary-fixed-variant": "#881d24",
                        "on-primary-fixed-variant": "#004d63",
                        "inverse-surface": "#dae2fd",
                        "on-surface-variant": "#bfc8cd",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed": "#410006",
                        "on-error": "#690005",
                        "tertiary-container": "#c64b4d",

                        "tertiary-fixed-dim": "#ffb3b0",

                        "surface-container": "#171f33",
                        "surface-container-highest": "#2d3449",
                        "outline": "#899297"

                    "borderRadius": {
                        "DEFAULT": "1rem",

                        "xl": "3rem",

                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }

            },
        }

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b1326; color: #dae2fd; min-height: max(884px, 100dvh); }
        .glass-panel { backdrop-filter: blur(24px); background-color: rgba(34, 42, 61, 0.6); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .active-tab { font-variation-settings: 'FILL' 1; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #2d3449; border-radius: 10px; }
        .scale-98 { transform: scale(0.98); }
    </style>
  </head>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
